<!DOCTYPE html>
<html lang="pt-BR">
 <head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <meta content="Recuperação segura de acesso ao Barber Hub." name="description"/>
  <title>
   Redefinir senha | Barber Hub
  </title>
  <link href="../img/favicon.ico" rel="shortcut icon"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
  <link href="../css/framework.css" rel="stylesheet"/>
  <link href="../css/global.css" rel="stylesheet"/>
  <link href="../css/pages.css" rel="stylesheet"/>
  <link href="../manifest.webmanifest" rel="manifest"/>
  <meta content="yes" name="apple-mobile-web-app-capable"/>
  <meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
   <link rel="stylesheet" href="../css/mobile-app.css">
</head>
 <body>
  <!-- Cabeçalho e navegação principal -->
  <header class="header">
   <div class="container nav">
    <a class="logo" href="../index.html">
     <img alt="Barber Hub" src="../img/logomarcaTRANSPARENTE.png"/>
     <span>
      Barber Hub
      <small>
       Gestão inteligente
      </small>
     </span>
    </a>
    <div class="nav-actions">
     <button aria-label="Alternar tema" class="btn-tema" id="btnTema" title="Alternar tema">
      <i class="bi bi-circle-half">
      </i>
     </button>
     <a class="btn btn-outline btn-small" href="login.html">
      <i class="bi bi-box-arrow-in-right">
      </i>
      Entrar
     </a>
     <button aria-label="Abrir menu lateral" class="btn-menu" id="btnMenu">
      <i class="bi bi-list">
      </i>
     </button>
    </div>
   </div>
  </header>
  <!-- Conteúdo principal da página -->
  <main class="auth-wrap">
   <section class="auth-card form-card">
    <a class="logo auth-logo" href="../index.html">
     <img alt="" src="../img/logomarcaTRANSPARENTE.png"/>
     <span>
      Barber Hub
      <small>
       Nova senha
      </small>
     </span>
    </a>
    <span class="tag auth-tag">
     <i class="bi bi-shield-lock">
     </i>
     Link de recuperação
    </span>
    <h1>
     Crie uma nova senha
    </h1>
    <p class="auth-subtitle">
     Use no mínimo 8 caracteres. Esta página só funciona depois de abrir o link enviado pelo Supabase.
    </p>
    <div class="recovery-note hidden" id="recuperacaoInvalida">
     <strong>
      Link inválido ou expirado.
     </strong>
     <br/>
     Solicite um novo e-mail de recuperação.
    </div>
    <form class="stack-form" id="formRedefinirSenha">
     <div class="campo">
      <label for="novaSenha">
       Nova senha
      </label>
      <input autocomplete="new-password" id="novaSenha" minlength="8" required="" type="password"/>
     </div>
     <div class="campo">
      <label for="confirmarNovaSenha">
       Confirmar nova senha
      </label>
      <input autocomplete="new-password" id="confirmarNovaSenha" minlength="8" required="" type="password"/>
     </div>
     <button class="btn btn-primary full" type="submit">
      <i class="bi bi-key">
      </i>
      Salvar nova senha
     </button>
    </form>
    <p class="auth-note">
     <a href="recuperar-senha.html">
      Solicitar outro link
     </a>
    </p>
   </section>
  </main>
  <div class="toast" id="toast">
  </div>
  <!-- Scripts compartilhados e específicos da página -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <script src="../js/supabase-config.js">
  </script>
  <script src="../js/supabase-client.js">
  </script>
  <script src="../js/utils.js">
  </script>
  <script src="../js/toast.js">
  </script>
  <script src="../js/auth.js">
  </script>
  <script src="../js/api.js">
  </script>
  <script src="../js/status.js">
  </script>
  <script src="../js/ia.js">
  </script>
  <script src="../vendor/bootstrap.bundle.min.js">
  </script>
  <script src="../js/ui.js">
  </script>
  <script src="../js/redefinir-senha.js">
  </script>
   <script src="../js/mobile-app.js"></script>
</body>
</html>
