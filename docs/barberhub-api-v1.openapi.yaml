openapi: 3.1.0
info:
  title: Barber Hub API
  version: 1.0.0
  description: API própria da plataforma Barber Hub.
servers:
  - url: https://barberhuboficial.vercel.app/api/v1
paths:
  /health:
    get:
      summary: Verifica o estado da API
      responses:
        '200': { description: API disponível }
  /catalog/summary:
    get:
      summary: Retorna métricas públicas
      responses:
        '200': { description: Métricas carregadas }
  /support/tickets:
    get:
      summary: Lista os tickets do usuário
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Tickets carregados }
        '401': { description: Sessão ausente ou inválida }
    post:
      summary: Abre um ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nome, email, assunto, mensagem]
              properties:
                nome: { type: string, maxLength: 120 }
                email: { type: string, format: email }
                categoria: { type: string }
                prioridade: { type: string }
                assunto: { type: string, maxLength: 160 }
                mensagem: { type: string, maxLength: 4000 }
      responses:
        '201': { description: Ticket criado }
        '422': { description: Dados inválidos }
  /account/delete:
    delete:
      summary: Exclui a própria conta
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Conta excluída }
        '401': { description: Sessão inválida }
  /admin/overview:
    get:
      summary: Resumo administrativo
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Resumo carregado }
        '403': { description: Conta sem permissão administrativa }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
